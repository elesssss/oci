name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.17'

      - name: Cache go module
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set version
        run: |
          # 手动触发时使用输入的版本号，否则使用 tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          # 创建临时 tag 让 git describe 能返回正确版本号
          git tag "${VERSION}" 2>/dev/null || true

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Patch Makefile to include .service files
        run: |
          sed -i 's|@zip -du $(BUILD_DIR)/$(NAME)-$<-$(VERSION).zip \*.ini|@zip -du $(BUILD_DIR)/$(NAME)-$<-$(VERSION).zip *.ini *.service|' Makefile

      - name: Build
        run: make release -j$(nproc)

      - name: Generate checksums
        run: |
          cd build
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/*.zip
            build/SHA256SUMS.txt
