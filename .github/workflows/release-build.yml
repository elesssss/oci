name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整 tag 历史，让 git describe 能正确获取版本号

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.17'

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Patch Makefile to include .service files
        run: |
          # 在打 zip 时追加打包两个 service 文件
          sed -i 's|@zip -du $(BUILD_DIR)/$(NAME)-$<-$(VERSION).zip \*.ini|@zip -du $(BUILD_DIR)/$(NAME)-$<-$(VERSION).zip *.ini *.service|' Makefile

      - name: Build and package
        run: make release

      - name: Generate checksums
        run: |
          cd build
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/*.zip
            build/SHA256SUMS.txt
