name: Build and Release

on:
  push:
    tags:
      - 'v*'   # 推送 v1.0.0 这样的 tag 时触发

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/setup-go@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.18'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          BINARY="oci${EXT}"
          ARCHIVE="oci-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o "${BINARY}" .
          tar -czf "${ARCHIVE}" "${BINARY}" config.ini oci-amd.service oci-arm.service
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oci-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
